<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Notas</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:380px;
    background:white;
    padding:18px;
    border-radius:12px;
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:12px;
    font-size:18px;
}

/* SECTION TITLE */
.section-title{
    font-size:13px;
    font-weight:bold;
    color:#1e293b;
    margin:10px 0 6px;
}

/* CALLER / MEMBER */
.roles{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

.roles label{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
    padding:6px;
    background:#f1f5f9;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

/* SMALL SECTIONS */
.small-title{
    font-size:12px;
    margin-top:10px;
    margin-bottom:6px;
    color:#334155;
}

.first-time{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

.small-option{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:4px;
    padding:5px;
    background:#f1f5f9;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
}

/* HIPAA */
.hipaa label{
    display:block;
    padding:8px;
    margin-bottom:6px;
    background:#f1f5f9;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

/* SYMPTOMS */
.option{
    display:block;
    padding:8px;
    margin-bottom:6px;
    background:#f1f5f9;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

/* ACTIONS */
.actions-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:4px;
}

.actions-grid .small-option{
    font-size:11px;
    padding:4px;
    border-radius:6px;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:120px;
    margin-top:10px;
    padding:8px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    font-size:12px;
}

/* BUTTON */
.copy{
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#10b981;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.copy:hover{
    background:#059669;
}

/* 🔥 TOAST POPUP */
#toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#10b981;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:0.3s ease;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Generador de Notas</h1>

<!-- CALLER / MEMBER -->
<div class="section-title">👤 Type of Interaction</div>

<div class="roles">

<label>
<input type="checkbox" id="caller" onchange="generate()">
Caller
</label>

<label>
<input type="checkbox" id="member" onchange="generate()">
Member
</label>

</div>

<!-- HIPAA -->
<div class="section-title">🔐 HIPAA Verifiers</div>

<div class="hipaa">

<label><input type="checkbox" value="MID & DOB" onchange="generate()"> MID & DOB</label>
<label><input type="checkbox" value="DOB, Address and Phone Number" onchange="generate()"> DOB, Address and Phone Number</label>
<label><input type="checkbox" value="IVR Verified with MID and DOB" onchange="generate()"> IVR Verified with MID and DOB</label>

</div>

<!-- FIRST TIME -->
<div class="section-title small-title">First time calling?</div>
<div class="first-time">

<label class="small-option"><input type="radio" name="firstTime" value="Yes" onchange="generate()"> Yes</label>
<label class="small-option"><input type="radio" name="firstTime" value="No" onchange="generate()"> No</label>

</div>

<!-- PERSONAL -->
<div class="section-title small-title">Personal Info Changed</div>
<div class="first-time">

<label class="small-option"><input type="radio" name="personalChange" value="Yes" onchange="generate()"> Yes</label>
<label class="small-option"><input type="radio" name="personalChange" value="No" onchange="generate()"> No</label>

</div>

<!-- CONTACT -->
<div class="section-title small-title">Contact Valid</div>
<div class="first-time">

<label class="small-option"><input type="radio" name="contactValid" value="Yes" onchange="generate()"> Yes</label>
<label class="small-option"><input type="radio" name="contactValid" value="No" onchange="generate()"> No</label>

</div>

<!-- WEBSITE -->
<div class="section-title small-title">Website</div>
<div class="first-time">

<label class="small-option"><input type="radio" name="website" value="Mentioned" onchange="generate()"> Mentioned</label>

</div>

<!-- GAPS -->
<div class="section-title small-title">Gaps in Care</div>
<div class="first-time">

<label class="small-option"><input type="radio" name="gaps" value="Member will schedule appointment" onchange="generate()"> Schedule</label>
<label class="small-option"><input type="radio" name="gaps" value="Intent cancelled" onchange="generate()"> Cancelled</label>
<label class="small-option"><input type="radio" name="gaps" value="Not mentioned" onchange="generate()"> Not mentioned</label>

</div>

<!-- ACTIONS -->
<div class="section-title small-title">Actions</div>

<div class="actions-grid">

<label class="small-option"><input type="checkbox" name="actions" value="B&E" onchange="generate()"> B&E</label>
<label class="small-option"><input type="checkbox" name="actions" value="Material Request" onchange="generate()"> Material Request</label>
<label class="small-option"><input type="checkbox" name="actions" value="LVS" onchange="generate()"> LVS</label>
<label class="small-option"><input type="checkbox" name="actions" value="Update Demographics" onchange="generate()"> Demographics</label>
<label class="small-option"><input type="checkbox" name="actions" value="Update Preferences" onchange="generate()"> Preferences</label>
<label class="small-option"><input type="checkbox" name="actions" value="Hot Topics" onchange="generate()"> Hot Topics</label>
<label class="small-option"><input type="checkbox" name="actions" value="Issues" onchange="generate()"> Issues</label>

</div>

<!-- CALLER NAME -->
<div class="section-title small-title">Caller Name</div>
<div class="first-time">
<label class="small-option"><input type="checkbox" name="callerName" value="Caller Name" onchange="generate()"> Caller Name</label>
</div>

<!-- INTERACTION ID -->
<div class="section-title small-title">Interaction ID</div>
<div class="first-time">

<label class="small-option"><input type="checkbox" name="interactionId" value="Interaction ID" onchange="generate()"> Interaction ID</label>
<label class="small-option"><input type="checkbox" name="interactionId" value="Met Interaction ID" onchange="generate()"> Met Interaction ID</label>

</div>

<!-- IN HOME -->
<div class="section-title small-title">In Home Assessment</div>
<div class="first-time">

<label class="small-option"><input type="checkbox" name="inHome" value="Mentioned" onchange="generate()"> Mentioned</label>
<label class="small-option"><input type="checkbox" name="inHome" value="Not relevant" onchange="generate()"> Not relevant</label>

</div>

<!-- RESOLUTION -->
<div class="section-title small-title">Resolution</div>
<div class="first-time">

<label class="small-option"><input type="checkbox" name="resolution" value="Caller educated" onchange="generate()"> Caller</label>
<label class="small-option"><input type="checkbox" name="resolution" value="Member educated" onchange="generate()"> Member</label>

</div>

<!-- OUTPUT -->
<textarea id="nota"></textarea>

<button class="copy" onclick="copiar()">📋 Copiar Nota</button>

</div>

<!-- TOAST -->
<div id="toast">📋 Nota copiada</div>

<script>

function generate(){

    let text = "";

    let caller = document.getElementById("caller").checked;
    let member = document.getElementById("member").checked;

    if(caller) text += "Caller active.\n";
    if(member) text += "Member active.\n";

    let hipaa = [...document.querySelectorAll(".hipaa input:checked")].map(i => i.value);
    if(hipaa.length) text += "HIPAA: " + hipaa.join(", ") + ".\n";

    let firstTime = document.querySelector('input[name="firstTime"]:checked');
    if(firstTime) text += "First time: " + firstTime.value + ".\n";

    let personal = document.querySelector('input[name="personalChange"]:checked');
    if(personal) text += "Personal change: " + personal.value + ".\n";

    let contact = document.querySelector('input[name="contactValid"]:checked');
    if(contact) text += "Contact valid: " + contact.value + ".\n";

    let website = document.querySelector('input[name="website"]:checked');
    if(website) text += "Website: " + website.value + ".\n";

    let gaps = document.querySelector('input[name="gaps"]:checked');
    if(gaps) text += "Gaps: " + gaps.value + ".\n";

    let actions = [...document.querySelectorAll('input[name="actions"]:checked')].map(i => i.value);
    if(actions.length) text += "Actions: " + actions.join(", ") + ".\n";

    let callerName = document.querySelector('input[name="callerName"]:checked');
    if(callerName) text += "Caller Name: " + callerName.value + ".\n";

    let interactionId = [...document.querySelectorAll('input[name="interactionId"]:checked')].map(i => i.value);
    if(interactionId.length) text += "Interaction ID: " + interactionId.join(", ") + ".\n";

    let inHome = [...document.querySelectorAll('input[name="inHome"]:checked')].map(i => i.value);
    if(inHome.length) text += "In Home: " + inHome.join(", ") + ".\n";

    let resolution = [...document.querySelectorAll('input[name="resolution"]:checked')].map(i => i.value);
    if(resolution.length) text += "Resolution: " + resolution.join(", ") + ".\n";

    document.getElementById("nota").value = text;
}

function copiar(){

    navigator.clipboard.writeText(document.getElementById("nota").value);

    let toast = document.getElementById("toast");
    toast.style.opacity = "1";

    setTimeout(() => {
        toast.style.opacity = "0";
    }, 1500);

}

</script>

</body>
</html>
